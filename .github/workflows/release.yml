name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ffs-cli ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ffs
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ffs
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ffs
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ffs.exe
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      # Decode the Apple-issued provisioning profile (Developer ID
      # subtype) so the build embeds it via __TEXT,__provisioning.
      # AMFI requires this on every Mach-O claiming the restricted
      # `keychain-access-groups` entitlement (ADR-023). Builds
      # without the secret produce an unsigned/unauthorized binary
      # that the daemon's runtime gate (`is_signed_with_keychain_
      # entitlement`) detects and routes around — same behavior
      # contributor forks see.
      - name: Stage provisioning profile (macOS)
        id: stage-profile
        if: startsWith(matrix.os, 'macos')
        env:
          MACOS_PROVISIONING_PROFILE_B64: ${{ secrets.MACOS_PROVISIONING_PROFILE_B64 }}
        run: |
          if [[ -z "${MACOS_PROVISIONING_PROFILE_B64:-}" ]]; then
            echo "MACOS_PROVISIONING_PROFILE_B64 not set; build will not embed a profile" >&2
            echo "staged=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          mkdir -p "$RUNNER_TEMP/ffs-codesign"
          echo "$MACOS_PROVISIONING_PROFILE_B64" \
            | base64 --decode \
            > "$RUNNER_TEMP/ffs-codesign/embedded.provisionprofile"
          echo "profile_path=$RUNNER_TEMP/ffs-codesign/embedded.provisionprofile" \
            >>"$GITHUB_OUTPUT"
          echo "staged=true" >>"$GITHUB_OUTPUT"

      - name: Build ffs-cli
        env:
          # Set on macOS-staged builds so each binary crate's
          # build.rs embeds the profile via the linker section. On
          # Linux/Windows or when the secret is missing, this stays
          # empty and the build.rs is a no-op.
          FFS_PROVISIONING_PROFILE: ${{ steps.stage-profile.outputs.profile_path }}
        run: cargo build --release --target ${{ matrix.target }} --bin ffs

      - name: Verify static linkage (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          file target/${{ matrix.target }}/release/${{ matrix.artifact }}
          # On musl, ldd typically prints "statically linked" or fails to find dyn deps.
          ldd target/${{ matrix.target }}/release/${{ matrix.artifact }} || true

      - name: Verify linkage (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          file target/${{ matrix.target }}/release/${{ matrix.artifact }}
          otool -L target/${{ matrix.target }}/release/${{ matrix.artifact }}
          # Sanity-check the provisioning section is actually present
          # when the secret was staged. Failure here means the build.rs
          # didn't pick up the env var — fail loudly rather than ship
          # an unsigned-at-AMFI artifact.
          if [[ "${{ steps.stage-profile.outputs.staged }}" == "true" ]]; then
            otool -l target/${{ matrix.target }}/release/${{ matrix.artifact }} \
              | grep -q "sectname __provisioning" \
              || { echo "::error::profile staged but not embedded; build.rs did not fire"; exit 1; }
          fi

      # Codesign + notarize the macOS binary (task_33 + ADR-023).
      # Required secrets:
      #   MACOS_SIGNING_CERT_P12 — base64-encoded .p12 export of a
      #     "Developer ID Application" cert + private key.
      #   MACOS_SIGNING_CERT_PASSWORD — password the .p12 was
      #     exported with.
      #   MACOS_SIGNING_IDENTITY — codesign identity string, e.g.,
      #     "Developer ID Application: Alex Foley (3S9R9K2L38)".
      #   MACOS_PROVISIONING_PROFILE_B64 — base64 of the Apple-issued
      #     Developer ID provisioning profile (staged above; without
      #     it, AMFI will SIGKILL the binary at exec).
      #   MACOS_NOTARYTOOL_APPLE_ID — Apple ID email.
      #   MACOS_NOTARYTOOL_TEAM_ID — 10-char team identifier.
      #   MACOS_NOTARYTOOL_PASSWORD — app-specific password from
      #     appleid.apple.com (NOT the Apple ID password itself).
      # When any of them is missing, the workflow skips signing and
      # ships the unsigned binary so forks without Apple Developer
      # accounts can still produce releases.
      - name: Import signing certificate (macOS)
        id: import-cert
        if: startsWith(matrix.os, 'macos')
        env:
          MACOS_SIGNING_CERT_P12: ${{ secrets.MACOS_SIGNING_CERT_P12 }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          if [[ -z "${MACOS_SIGNING_CERT_P12:-}" || -z "${MACOS_SIGNING_CERT_PASSWORD:-}" ]]; then
            echo "macOS signing secrets not configured; skipping import" >&2
            echo "imported=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$MACOS_SIGNING_CERT_P12" | base64 --decode > /tmp/ffs-signing-cert.p12
          # Ephemeral keychain so we don't touch the runner's login keychain.
          security create-keychain -p ci ffs-ci.keychain
          security default-keychain -s ffs-ci.keychain
          security unlock-keychain -p ci ffs-ci.keychain
          security set-keychain-settings -lut 21600 ffs-ci.keychain
          security import /tmp/ffs-signing-cert.p12 \
            -k ffs-ci.keychain \
            -P "$MACOS_SIGNING_CERT_PASSWORD" \
            -T /usr/bin/codesign
          # Allow codesign to use the private key non-interactively.
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k ci ffs-ci.keychain >/dev/null
          rm -f /tmp/ffs-signing-cert.p12
          echo "imported=true" >>"$GITHUB_OUTPUT"

      - name: Codesign macOS binary
        if: >-
          startsWith(matrix.os, 'macos') &&
          steps.import-cert.outputs.imported == 'true' &&
          steps.stage-profile.outputs.staged == 'true' &&
          env.MACOS_SIGNING_IDENTITY != ''
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          export FFS_SIGNING_IDENTITY="$MACOS_SIGNING_IDENTITY"
          ./scripts/codesign-macos.sh \
            target/${{ matrix.target }}/release/${{ matrix.artifact }}

      # Notarize the signed binary so macOS Gatekeeper will admit it
      # for downloaded installs. notarytool requires a zip wrapper
      # around bare Mach-O binaries.
      - name: Notarize macOS binary
        if: >-
          startsWith(matrix.os, 'macos') &&
          steps.import-cert.outputs.imported == 'true' &&
          steps.stage-profile.outputs.staged == 'true' &&
          env.MACOS_SIGNING_IDENTITY != '' &&
          env.MACOS_NOTARYTOOL_APPLE_ID != '' &&
          env.MACOS_NOTARYTOOL_TEAM_ID != '' &&
          env.MACOS_NOTARYTOOL_PASSWORD != ''
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_NOTARYTOOL_APPLE_ID: ${{ secrets.MACOS_NOTARYTOOL_APPLE_ID }}
          MACOS_NOTARYTOOL_TEAM_ID: ${{ secrets.MACOS_NOTARYTOOL_TEAM_ID }}
          MACOS_NOTARYTOOL_PASSWORD: ${{ secrets.MACOS_NOTARYTOOL_PASSWORD }}
        run: |
          set -euo pipefail
          BIN=target/${{ matrix.target }}/release/${{ matrix.artifact }}
          ZIP="$RUNNER_TEMP/${{ matrix.artifact }}.zip"
          /usr/bin/ditto -c -k --keepParent "$BIN" "$ZIP"
          xcrun notarytool submit "$ZIP" \
            --apple-id "$MACOS_NOTARYTOOL_APPLE_ID" \
            --team-id "$MACOS_NOTARYTOOL_TEAM_ID" \
            --password "$MACOS_NOTARYTOOL_PASSWORD" \
            --wait
          # Mach-O CLI binaries can't have a ticket stapled onto
          # them (no segment to embed it in); Gatekeeper does an
          # online lookup against Apple's CDN by content hash.
          # spctl --assess --type install is the right query for
          # raw Mach-O (--type execute is .app-bundle-shaped).
          spctl --assess --type install --verbose=4 "$BIN" \
            || { echo "::error::spctl rejected notarized binary"; exit 1; }
          rm -f "$ZIP"

      - name: Verify linkage (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dir target\${{ matrix.target }}\release\${{ matrix.artifact }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../ffs-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ matrix.artifact }} `
            -DestinationPath ffs-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ffs-${{ matrix.target }}
          path: ffs-${{ matrix.target }}.${{ matrix.archive_ext }}
