name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ffs-cli ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            artifact: ffs
            archive_ext: tar.gz
          - target: x86_64-apple-darwin
            os: macos-latest
            artifact: ffs
            archive_ext: tar.gz
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: ffs
            archive_ext: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: ffs.exe
            archive_ext: zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Install musl tools (Linux)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build ffs-cli
        run: cargo build --release --target ${{ matrix.target }} --bin ffs

      - name: Verify static linkage (Linux musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          file target/${{ matrix.target }}/release/${{ matrix.artifact }}
          # On musl, ldd typically prints "statically linked" or fails to find dyn deps.
          ldd target/${{ matrix.target }}/release/${{ matrix.artifact }} || true

      - name: Verify linkage (macOS)
        if: startsWith(matrix.os, 'macos')
        run: |
          file target/${{ matrix.target }}/release/${{ matrix.artifact }}
          otool -L target/${{ matrix.target }}/release/${{ matrix.artifact }}

      # Codesign the macOS binary with the keychain-access-group
      # entitlement so the daemon's keychain path works at runtime
      # (task_33 + ADR-023). Three repo secrets need to be set:
      #   MACOS_SIGNING_CERT_P12 — base64-encoded .p12 export of a
      #     "Developer ID Application" cert + private key.
      #   MACOS_SIGNING_CERT_PASSWORD — password the .p12 was
      #     exported with.
      #   MACOS_SIGNING_IDENTITY — codesign identity string, e.g.,
      #     "Developer ID Application: Alex Foley (3S9R9K2L38)".
      # When any of them is missing, the workflow skips signing and
      # leaves the unsigned binary in place so forks without
      # signing infrastructure can still build releases.
      - name: Import signing certificate (macOS)
        id: import-cert
        if: startsWith(matrix.os, 'macos')
        env:
          MACOS_SIGNING_CERT_P12: ${{ secrets.MACOS_SIGNING_CERT_P12 }}
          MACOS_SIGNING_CERT_PASSWORD: ${{ secrets.MACOS_SIGNING_CERT_PASSWORD }}
        run: |
          if [[ -z "${MACOS_SIGNING_CERT_P12:-}" || -z "${MACOS_SIGNING_CERT_PASSWORD:-}" ]]; then
            echo "macOS signing secrets not configured; skipping import" >&2
            echo "imported=false" >>"$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$MACOS_SIGNING_CERT_P12" | base64 --decode > /tmp/ffs-signing-cert.p12
          # Ephemeral keychain so we don't touch the runner's login keychain.
          security create-keychain -p ci ffs-ci.keychain
          security default-keychain -s ffs-ci.keychain
          security unlock-keychain -p ci ffs-ci.keychain
          security set-keychain-settings -lut 21600 ffs-ci.keychain
          security import /tmp/ffs-signing-cert.p12 \
            -k ffs-ci.keychain \
            -P "$MACOS_SIGNING_CERT_PASSWORD" \
            -T /usr/bin/codesign
          # Allow codesign to use the private key non-interactively.
          security set-key-partition-list \
            -S apple-tool:,apple: -s -k ci ffs-ci.keychain >/dev/null
          rm -f /tmp/ffs-signing-cert.p12
          echo "imported=true" >>"$GITHUB_OUTPUT"

      - name: Codesign macOS binary
        if: >-
          startsWith(matrix.os, 'macos') &&
          steps.import-cert.outputs.imported == 'true' &&
          env.MACOS_SIGNING_IDENTITY != ''
        env:
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          export FFS_SIGNING_IDENTITY="$MACOS_SIGNING_IDENTITY"
          ./scripts/codesign-macos.sh \
            target/${{ matrix.target }}/release/${{ matrix.artifact }}

      - name: Verify linkage (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          dir target\${{ matrix.target }}\release\${{ matrix.artifact }}

      - name: Package (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../ffs-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Package (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive `
            -Path target/${{ matrix.target }}/release/${{ matrix.artifact }} `
            -DestinationPath ffs-${{ matrix.target }}.zip

      - uses: actions/upload-artifact@v4
        with:
          name: ffs-${{ matrix.target }}
          path: ffs-${{ matrix.target }}.${{ matrix.archive_ext }}
